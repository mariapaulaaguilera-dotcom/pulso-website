<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 60" fill="none">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@800&amp;display=swap');</style>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5B4FDB"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </linearGradient>
  </defs>

  <!-- Icon: dark indigo diagonal gradient -->
  <rect x="2" y="2" width="56" height="56" rx="13" fill="url(#iconGrad)"/>
  <path d="M10,30 H17 Q19,24 21,30 H24 L26,34 L29,9 L32,37 Q34,30 36,30 Q38,20 41,30 H50"
    stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Wordmark: solid dark indigo -->
  <text x="70" y="40"
    style="font-family: Outfit, 'DM Sans', sans-serif; font-weight: 800; font-size: 26px; letter-spacing: 2px;"
    fill="#1E1B4B">PULSO</text>
</svg>
