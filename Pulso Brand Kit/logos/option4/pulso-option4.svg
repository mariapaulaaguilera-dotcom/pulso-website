<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 185" fill="none">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@800&amp;display=swap');</style>

    <!-- Gradient left→right: light indigo → deep navy, matching the reference's cyan→purple -->
    <linearGradient id="pulsoGrad" x1="30" y1="0" x2="270" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#8C86F0"/>
      <stop offset="50%"  stop-color="#5B4FDB"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </linearGradient>
  </defs>

  <!-- EKG waveform: open, no container — the signal IS the icon -->
  <!-- Flat → P-bump → double QRS spike (M shape) → T-bump → flat → dot -->
  <path d="M 30,80
    H 62
    Q 67,64 72,80
    H 82
    L 86,88 L 100,26 L 108,82
    L 113,24 L 121,82
    L 126,88 L 131,80
    H 152
    Q 157,63 162,80
    H 248"
    stroke="url(#pulsoGrad)"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"/>

  <!-- Terminal dot: signal endpoint, like reference -->
  <circle cx="260" cy="80" r="11" fill="#1E1B4B"/>

  <!-- PULSO wordmark — same gradient as waveform -->
  <text x="160" y="155"
    style="font-family: Outfit, 'DM Sans', sans-serif; font-weight: 800; font-size: 50px; letter-spacing: 8px; text-anchor: middle;"
    fill="url(#pulsoGrad)">PULSO</text>
</svg>
